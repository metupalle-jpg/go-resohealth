steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: bash
    args:
      - -c
      - |
        echo "Build started successfully!"
        echo "Working directory: $(pwd)"
        ls -la
        echo "---"
        ls -la cloud-functions/ || echo "No cloud-functions dir"
        echo "---"
        gcloud config list
        echo "---"
        gcloud functions list --project=dave-487819 --region=me-central1 --limit=3 2>&1
        echo "Build test complete!"
timeout: 300s
options:
  logging: CLOUD_LOGGING_ONLY
